<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Bola - Belajar Sambil Bermain</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes celebrate {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(5deg); }
            50% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }
        
        .bounce { animation: bounce 0.6s; }
        .float { animation: float 3s ease-in-out infinite; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .celebrate { animation: celebrate 1s ease-in-out; }
        .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
        
        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: 3px solid #ff4757;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .ball:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }
        
        .answer-target {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: 4px solid #2d8a80;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }
        
        .answer-target:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }
        
        .answer-target.correct {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            border-color: #229954;
        }
        
        .answer-target.wrong {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            border-color: #a93226;
        }
        
        .game-field {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .game-field::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-400 via-pink-500 to-red-500 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponen Halaman Pembelajaran
        const LearningPage = ({ onStartGame }) => {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-400 via-purple-500 to-pink-500 p-4">
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-5xl font-bold text-white mb-4 float">
                                🏈 Matematika Bola 🏈
                            </h1>
                            <p className="text-xl text-white opacity-90">
                                Belajar Matematika Sambil Bermain!
                            </p>
                        </div>

                        {/* Konten Pembelajaran */}
                        <div className="grid md:grid-cols-2 gap-8 mb-8">
                            {/* Penjumlahan */}
                            <div className="bg-white rounded-2xl p-6 shadow-2xl">
                                <div className="text-center mb-4">
                                    <div className="text-4xl mb-2">➕</div>
                                    <h2 className="text-2xl font-bold text-blue-600">Penjumlahan</h2>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-blue-50 rounded-lg p-4">
                                        <p className="text-lg font-semibold text-blue-800 mb-2">Contoh:</p>
                                        <div className="flex items-center justify-center space-x-2 text-2xl">
                                            <span>🍎🍎</span>
                                            <span className="font-bold text-blue-600">+</span>
                                            <span>🍎🍎🍎</span>
                                            <span className="font-bold text-blue-600">=</span>
                                            <span className="font-bold text-green-600">5</span>
                                        </div>
                                        <p className="text-center mt-2 text-blue-700">2 + 3 = 5</p>
                                    </div>
                                    <p className="text-gray-700">
                                        Penjumlahan adalah menggabungkan dua atau lebih angka untuk mendapatkan jumlah total.
                                    </p>
                                </div>
                            </div>

                            {/* Pengurangan */}
                            <div className="bg-white rounded-2xl p-6 shadow-2xl">
                                <div className="text-center mb-4">
                                    <div className="text-4xl mb-2">➖</div>
                                    <h2 className="text-2xl font-bold text-red-600">Pengurangan</h2>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-red-50 rounded-lg p-4">
                                        <p className="text-lg font-semibold text-red-800 mb-2">Contoh:</p>
                                        <div className="flex items-center justify-center space-x-2 text-2xl">
                                            <span>🍎🍎🍎🍎🍎</span>
                                            <span className="font-bold text-red-600">-</span>
                                            <span>🍎🍎</span>
                                            <span className="font-bold text-red-600">=</span>
                                            <span className="font-bold text-green-600">3</span>
                                        </div>
                                        <p className="text-center mt-2 text-red-700">5 - 2 = 3</p>
                                    </div>
                                    <p className="text-gray-700">
                                        Pengurangan adalah mengambil sejumlah angka dari angka yang lebih besar.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Tips Bermain */}
                        <div className="bg-white rounded-2xl p-6 shadow-2xl mb-8">
                            <h2 className="text-2xl font-bold text-purple-600 text-center mb-4">
                                🎮 Cara Bermain
                            </h2>
                            <div className="grid md:grid-cols-3 gap-4">
                                <div className="text-center p-4 bg-yellow-50 rounded-lg">
                                    <div className="text-3xl mb-2">🏈</div>
                                    <h3 className="font-bold text-yellow-700 mb-2">1. Lihat Soal</h3>
                                    <p className="text-sm text-yellow-600">Bola akan muncul dengan soal matematika</p>
                                </div>
                                <div className="text-center p-4 bg-green-50 rounded-lg">
                                    <div className="text-3xl mb-2">🎯</div>
                                    <h3 className="font-bold text-green-700 mb-2">2. Pilih Jawaban</h3>
                                    <p className="text-sm text-green-600">Klik angka yang benar di lapangan</p>
                                </div>
                                <div className="text-center p-4 bg-blue-50 rounded-lg">
                                    <div className="text-3xl mb-2">⭐</div>
                                    <h3 className="font-bold text-blue-700 mb-2">3. Dapatkan Poin</h3>
                                    <p className="text-sm text-blue-600">Jawaban benar = +10 poin!</p>
                                </div>
                            </div>
                        </div>

                        {/* Tombol Mulai */}
                        <div className="text-center">
                            <button
                                onClick={onStartGame}
                                className="bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-2xl transform hover:scale-105 transition-all duration-300 pulse"
                            >
                                🚀 Mulai Bermain!
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Komponen Game
        const MathBallGame = ({ onBackToLearning }) => {
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const [level, setLevel] = useState(1);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [answerOptions, setAnswerOptions] = useState([]);
            const [gameStatus, setGameStatus] = useState('playing'); // playing, won, lost
            const [feedback, setFeedback] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);

            // Generate soal matematika
            const generateQuestion = () => {
                const operations = ['+', '-'];
                const operation = operations[Math.floor(Math.random() * operations.length)];
                
                let num1, num2, correctAnswer;
                
                if (operation === '+') {
                    num1 = Math.floor(Math.random() * (5 + level * 2)) + 1;
                    num2 = Math.floor(Math.random() * (5 + level * 2)) + 1;
                    correctAnswer = num1 + num2;
                } else {
                    num1 = Math.floor(Math.random() * (10 + level * 2)) + 5;
                    num2 = Math.floor(Math.random() * num1) + 1;
                    correctAnswer = num1 - num2;
                }

                const question = {
                    text: `${num1} ${operation} ${num2}`,
                    answer: correctAnswer
                };

                // Generate pilihan jawaban
                const options = [correctAnswer];
                while (options.length < 4) {
                    const wrongAnswer = correctAnswer + Math.floor(Math.random() * 10) - 5;
                    if (wrongAnswer > 0 && !options.includes(wrongAnswer)) {
                        options.push(wrongAnswer);
                    }
                }

                // Acak urutan pilihan
                const shuffledOptions = options.sort(() => Math.random() - 0.5);

                setCurrentQuestion(question);
                setAnswerOptions(shuffledOptions);
            };

            // Handle jawaban
            const handleAnswer = (selectedAnswer) => {
                if (selectedAnswer === currentQuestion.answer) {
                    setScore(score + 10);
                    setFeedback('🎉 Benar! +10 poin');
                    setShowFeedback(true);
                    
                    setTimeout(() => {
                        setShowFeedback(false);
                        if (score + 10 >= level * 50) {
                            if (level >= 5) {
                                setGameStatus('won');
                            } else {
                                setLevel(level + 1);
                                generateQuestion();
                            }
                        } else {
                            generateQuestion();
                        }
                    }, 1500);
                } else {
                    setLives(lives - 1);
                    setFeedback('❌ Salah! Coba lagi');
                    setShowFeedback(true);
                    
                    setTimeout(() => {
                        setShowFeedback(false);
                        if (lives - 1 <= 0) {
                            setGameStatus('lost');
                        }
                    }, 1500);
                }
            };

            // Reset game
            const resetGame = () => {
                setScore(0);
                setLives(3);
                setLevel(1);
                setGameStatus('playing');
                setFeedback('');
                setShowFeedback(false);
                generateQuestion();
            };

            // Initialize game
            useEffect(() => {
                generateQuestion();
            }, []);

            // Render game over screen
            if (gameStatus === 'won') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-green-400 via-blue-500 to-purple-600 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-8 text-center shadow-2xl max-w-md w-full celebrate">
                            <div className="text-6xl mb-4">🏆</div>
                            <h2 className="text-3xl font-bold text-green-600 mb-4">Selamat!</h2>
                            <p className="text-lg text-gray-700 mb-4">Kamu berhasil menyelesaikan semua level!</p>
                            <div className="text-2xl font-bold text-purple-600 mb-6">
                                Skor Akhir: {score}
                            </div>
                            <div className="space-y-4">
                                <button
                                    onClick={resetGame}
                                    className="w-full bg-gradient-to-r from-green-400 to-blue-500 text-white font-bold py-3 px-6 rounded-full hover:from-green-500 hover:to-blue-600 transition-all duration-300"
                                >
                                    🔄 Main Lagi
                                </button>
                                <button
                                    onClick={onBackToLearning}
                                    className="w-full bg-gradient-to-r from-purple-400 to-pink-500 text-white font-bold py-3 px-6 rounded-full hover:from-purple-500 hover:to-pink-600 transition-all duration-300"
                                >
                                    📚 Kembali Belajar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameStatus === 'lost') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-red-400 via-pink-500 to-purple-600 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-8 text-center shadow-2xl max-w-md w-full">
                            <div className="text-6xl mb-4">😢</div>
                            <h2 className="text-3xl font-bold text-red-600 mb-4">Game Over</h2>
                            <p className="text-lg text-gray-700 mb-4">Jangan menyerah! Coba lagi ya!</p>
                            <div className="text-2xl font-bold text-purple-600 mb-6">
                                Skor: {score}
                            </div>
                            <div className="space-y-4">
                                <button
                                    onClick={resetGame}
                                    className="w-full bg-gradient-to-r from-red-400 to-pink-500 text-white font-bold py-3 px-6 rounded-full hover:from-red-500 hover:to-pink-600 transition-all duration-300"
                                >
                                    🔄 Coba Lagi
                                </button>
                                <button
                                    onClick={onBackToLearning}
                                    className="w-full bg-gradient-to-r from-purple-400 to-pink-500 text-white font-bold py-3 px-6 rounded-full hover:from-purple-500 hover:to-pink-600 transition-all duration-300"
                                >
                                    📚 Kembali Belajar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Render game
            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-400 via-pink-500 to-red-500 p-4">
                    <div className="max-w-4xl mx-auto">
                        {/* Header Game */}
                        <div className="bg-white rounded-2xl p-4 mb-6 shadow-2xl">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center space-x-4">
                                    <div className="text-2xl font-bold text-purple-600">
                                        ⭐ {score}
                                    </div>
                                    <div className="text-2xl font-bold text-red-600">
                                        ❤️ {lives}
                                    </div>
                                    <div className="text-2xl font-bold text-blue-600">
                                        🏆 Level {level}
                                    </div>
                                </div>
                                <button
                                    onClick={onBackToLearning}
                                    className="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-full transition-colors"
                                >
                                    ← Kembali
                                </button>
                            </div>
                        </div>

                        {/* Area Game */}
                        <div className="game-field p-8 mb-6 shadow-2xl">
                            {/* Bola dengan Soal */}
                            <div className="text-center mb-8">
                                <div className="inline-block">
                                    <div className="ball float text-lg">
                                        {currentQuestion?.text}
                                    </div>
                                    <p className="text-white font-bold mt-2">Klik jawaban yang benar!</p>
                                </div>
                            </div>

                            {/* Pilihan Jawaban */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 justify-items-center">
                                {answerOptions.map((option, index) => (
                                    <div
                                        key={index}
                                        className="answer-target hover:scale-110 transform transition-all duration-300"
                                        onClick={() => handleAnswer(option)}
                                    >
                                        {option}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Feedback */}
                        {showFeedback && (
                            <div className="fixed inset-0 flex items-center justify-center z-50">
                                <div className="bg-white rounded-2xl p-8 text-center shadow-2xl celebrate">
                                    <div className="text-4xl font-bold text-purple-600">
                                        {feedback}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Progress Bar */}
                        <div className="bg-white rounded-2xl p-4 shadow-2xl">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm font-bold text-gray-600">Progress Level {level}</span>
                                <span className="text-sm font-bold text-gray-600">{score}/{level * 50}</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-4">
                                <div
                                    className="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all duration-500"
                                    style={{ width: `${Math.min((score / (level * 50)) * 100, 100)}%` }}
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Komponen Utama
        const App = () => {
            const [currentPage, setCurrentPage] = useState('learning');

            return (
                <div>
                    {currentPage === 'learning' ? (
                        <LearningPage onStartGame={() => setCurrentPage('game')} />
                    ) : (
                        <MathBallGame onBackToLearning={() => setCurrentPage('learning')} />
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

</html>
